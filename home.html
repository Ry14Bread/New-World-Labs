<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New World Labs // Project Hub</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="dark">

  <!-- TOP BAR -->
  <header class="topbar">
    <h2>NEW WORLD LABS // PROJECT HUB</h2>

    <input 
      type="text" 
      id="searchBar" 
      placeholder="Search projects, systems, archives..." 
      onkeyup="searchFolders()"
    >
  </header>

  <main class="container">

    <h3 style="text-align:center; color:#4aa3ff; margin-top:20px;">
      ACTIVE PROJECT DIRECTORY
    </h3>

    <p style="text-align:center; color:#aaa;">
      Select a project system to access its archive
    </p>

    <!-- PROJECT GRID -->
    <div class="file-grid" id="fileGrid">

      <!-- SAWBOO -->
      <a href="sawboo.html" class="folder-link">
        <div class="file-card" data-name="project sawboo">
          <h3>PROJECT SAWBOO</h3>
          <p>Study and Analysis of Worlds Beyond Our Own.</p>
        </div>
      </a>

      <!-- RADAR -->
      <a href="radar.html" class="folder-link">
        <div class="file-card" data-name="radar anomalous reports">
          <h3>R.A.D.A.R.</h3>
          <p>Research, Analysis, and Documentation of Anomalous Reports.</p>
        </div>
      </a>

      <!-- EMPLOYEE FILES -->
      <a href="employee.html" class="folder-link">
        <div class="file-card locked" data-name="employee files locked">
          <h3>EMPLOYEE FILES 🔒</h3>
          <p>Restricted access. Clearance required.</p>
        </div>
      </a>

    </div>

  </main>

  <!-- SEARCH SCRIPT -->
  <script>
    function searchFolders() {
      const input = document.getElementById("searchBar").value.toLowerCase();
      const folders = document.querySelectorAll(".file-card");

      folders.forEach(folder => {
        const name = folder.getAttribute("data-name").toLowerCase();
        const text = folder.innerText.toLowerCase();

        if (name.includes(input) || text.includes(input)) {
          folder.style.display = "block";
        } else {
          folder.style.display = "none";
        }
      });
    }
  </script>

</body>
</html>
